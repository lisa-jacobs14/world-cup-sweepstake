name: Update scores

# Runs hourly to fetch the latest World Cup scores and commit results.json.
# You can also run it on demand from the Actions tab ("Run workflow").
on:
  schedule:
    - cron: "7 * * * *"   # every hour, at 7 minutes past
  workflow_dispatch: {}

permissions:
  contents: write          # lets the job commit results.json back to the repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest scores
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update-results.mjs

      - name: Commit results.json if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain results.json)" ]; then
            git add results.json
            git commit -m "Auto-update scores"
            git push
          else
            echo "No score changes this run."
          fi
